<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur de Planification - Usine Camaret</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
            --success-bg: #f0fdf4;
            --success-text: #166534;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 1000px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 0.5rem; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; }
        .card { background-color: var(--card); padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        textarea {
            width: 100%; height: 200px; padding: 1rem; border: 1px solid #cbd5e1; border-radius: 6px;
            font-family: monospace; font-size: 14px; white-space: pre; overflow-wrap: normal; overflow-x: auto; box-sizing: border-box;
        }
        button {
            display: block; width: 100%; padding: 1rem; background-color: var(--primary); color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 1rem;
        }
        button:hover { background-color: #1d4ed8; }
        .report-day { margin-top: 1.5rem; padding: 1rem; border-left: 4px solid #cbd5e1; background: #f1f5f9; }
        .report-day h3 { margin-top: 0; }
        .alert { padding: 1rem; border-radius: 6px; margin-top: 1rem; border: 1px solid transparent; }
        .alert-error { background-color: var(--error-bg); color: var(--error-text); border-color: #fca5a5; }
        .alert-success { background-color: var(--success-bg); color: var(--success-text); border-color: #86efac; }
        .alert-title { font-weight: bold; margin-bottom: 0.5rem; }
        .solution { margin-top: 0.5rem; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Contrôleur de Contraintes - Camaret</h1>
    <p class="subtitle">Copiez votre tableau brut (y compris les semaines type s14/2026) et collez-le ici.</p>

    <div class="card">
        <textarea id="dataInput" placeholder="Collez le tableau Excel ici..."></textarea>
        <button onclick="analyserPlanif()">Analyser la Planification</button>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
function analyserPlanif() {
    const rawData = document.getElementById('dataInput').value;
    const resultsArea = document.getElementById('resultsArea');
    resultsArea.innerHTML = '<h2>Rapport d\'analyse</h2>';

    if (!rawData.trim()) {
        resultsArea.innerHTML += '<div class="alert alert-error">Veuillez coller des données.</div>';
        return;
    }

    const rows = rawData.split('\n').map(row => row.split('\t'));
    
    // NOUVEAU : On accepte les dates (JJ/MM/AAAA) OU les semaines (s14/2026 ou S14/2026)
    const dateOrWeekRegex = /(\d{2}[\/-]\d{2}[\/-]\d{2,4})|([sS]\d{1,2}\/\d{4})/; 

    let headerRowIndex = -1;
    let colDateStart = -1;

    // 1. Chasse à l'en-tête
    for (let i = 0; i < rows.length; i++) {
        for (let j = 0; j < rows[i].length; j++) {
            if (rows[i][j] && rows[i][j].trim().match(dateOrWeekRegex)) {
                headerRowIndex = i;
                colDateStart = j;
                break;
            }
        }
        if (headerRowIndex !== -1) break;
    }

    if (headerRowIndex === -1) {
        resultsArea.innerHTML += '<div class="alert alert-error">Impossible de trouver les dates ou les semaines (ex: 22/03/2026 ou s14/2026).</div>';
        return;
    }

    const headers = rows[headerRowIndex];
    let colFormat = -1;
    let colLigne = -1;

    // 2. Identification des colonnes
    for (let i = 0; i < headers.length; i++) {
        let h = headers[i].toLowerCase();
        if (h.includes("format")) colFormat = i;
        if (h.includes("ligne") || h.includes("boite")) colLigne = i;
    }

    if (colLigne === -1) {
        colLigne = colDateStart - 1; // On déduit la colonne juste avant les dates
    }

    if (colFormat === -1 || colLigne === -1) {
        resultsArea.innerHTML += '<div class="alert alert-error">Impossible de détecter la colonne Format ou Ligne.</div>';
        return;
    }

    let hasErrorsGlobal = false;

    // 3. Analyse de toutes les colonnes (Jours ET Semaines)
    for (let dayIndex = colDateStart; dayIndex < headers.length; dayIndex++) {
        const currentDate = headers[dayIndex] ? headers[dayIndex].trim() : "";
        
        // On vérifie que c'est bien une date ou une semaine
        if (!currentDate.match(dateOrWeekRegex)) continue; 

        let bs_1_2 = 0, bs_3_2 = 0, pf_1_2 = 0, pf_3_2 = 0;
        let l43_1_2 = 0, l31_1_2 = 0, l70_1_2 = 0;

        for (let r = headerRowIndex + 1; r < rows.length; r++) {
            const row = rows[r];
            if (row.length <= dayIndex) continue;

            let rawCell = row[dayIndex] ? row[dayIndex].replace(/\s/g, '').replace(',', '.') : "0";
            let prodQty = parseFloat(rawCell) || 0;
            if (prodQty <= 0) continue; 

            let format = row[colFormat] ? row[colFormat].trim() : "";
            let ligne = row[colLigne] ? row[colLigne].trim().toUpperCase() : "";
            
            let isBS = ligne.includes('42') || ligne.includes('43') || ligne.includes('31') || ligne.includes('70');
            let isPF = ligne.includes('52') || ligne.includes('CDTL');

            // Collecte de données
            if (format.includes('1/2')) {
                if (isBS) bs_1_2 += prodQty;
                if (isPF) pf_1_2 += prodQty;
                
                if (ligne.includes('43')) l43_1_2 += prodQty;
                if (ligne.includes('31')) l31_1_2 += prodQty;
                if (ligne.includes('70')) l70_1_2 += prodQty;
            }
            if (format.includes('3/2')) {
                if (isBS) bs_3_2 += prodQty;
                if (isPF) pf_3_2 += prodQty;
            }
        }

        // Est-ce une analyse au jour ou à la semaine ?
        let periodLabel = currentDate.toLowerCase().startsWith('s') ? "Semaine" : "Date";
        let dailyReport = `<div class="report-day"><h3>🗓️ ${periodLabel} : ${currentDate}</h3>`;
        let errorsToday = 0;

        // Règle 1 : PAL 16
        if ((bs_1_2 > 0 || bs_3_2 > 0) && (pf_1_2 > 0 || pf_3_2 > 0)) {
            dailyReport += `
            <div class="alert alert-error">
                <div class="alert-title">❌ Conflit potentiel sur le PAL 16</div>
                Production détectée en Fabrication (BS) ET en Conditionnement (PF) pour les formats 1/2 ou 3/2 sur cette période. Le PAL 16 ne peut faire qu'une action par jour. 
                <div class="solution">Attention : Sur une semaine complète, assurez-vous de ne pas planifier la Fab et le Condi le MÊME JOUR.</div>
            </div>`;
            errorsToday++;
        }

        // Règle 2 : Stérilisateur 1
        let activeSter1Lines = (l43_1_2 > 0 ? 1 : 0) + (l31_1_2 > 0 ? 1 : 0) + (l70_1_2 > 0 ? 1 : 0);
        if (activeSter1Lines > 1) {
            dailyReport += `
            <div class="alert alert-error">
                <div class="alert-title">❌ Conflit potentiel sur le Stérilisateur 1 (STER 01)</div>
                Plusieurs lignes de Fabrication (BS) au format 1/2 sont prévues.
                <div class="solution">Attention : Assurez-vous qu'elles ne tournent pas simultanément le même jour.</div>
            </div>`;
            errorsToday++;
        }

        if (errorsToday === 0) {
            dailyReport += `<div class="alert alert-success">✅ Toutes les contraintes majeures (PAL 16, STER 01) semblent respectées pour cette période.</div>`;
        } else {
            hasErrorsGlobal = true;
        }

        dailyReport += `</div>`;
        
        if (bs_1_2 > 0 || bs_3_2 > 0 || pf_1_2 > 0 || pf_3_2 > 0 || errorsToday > 0) {
            resultsArea.innerHTML += dailyReport;
        }
    }

    if (!hasErrorsGlobal) {
        resultsArea.innerHTML = '<h2>Rapport d\'analyse</h2><div class="alert alert-success"><div class="alert-title">🎉 Parfait !</div>Aucun conflit détecté sur l\'ensemble des dates et semaines !</div>' + resultsArea.innerHTML;
    }
}
</script>

</body>
</html>
