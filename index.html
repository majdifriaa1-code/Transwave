<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur de Planification - Usine Camaret</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
            --success-bg: #f0fdf4;
            --success-text: #166534;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 1000px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 0.5rem; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; }
        .card { background-color: var(--card); padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        textarea {
            width: 100%; height: 200px; padding: 1rem; border: 1px solid #cbd5e1; border-radius: 6px;
            font-family: monospace; font-size: 14px; white-space: pre; overflow-wrap: normal; overflow-x: auto; box-sizing: border-box;
        }
        button {
            display: block; width: 100%; padding: 1rem; background-color: var(--primary); color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 1rem;
        }
        button:hover { background-color: #1d4ed8; }
        .report-day { margin-top: 1.5rem; padding: 1rem; border-left: 4px solid #cbd5e1; background: #f1f5f9; }
        .report-day h3 { margin-top: 0; }
        .alert { padding: 1rem; border-radius: 6px; margin-top: 1rem; border: 1px solid transparent; }
        .alert-error { background-color: var(--error-bg); color: var(--error-text); border-color: #fca5a5; }
        .alert-success { background-color: var(--success-bg); color: var(--success-text); border-color: #86efac; }
        .alert-title { font-weight: bold; margin-bottom: 0.5rem; }
        .solution { margin-top: 0.5rem; font-style: italic; font-weight: bold; }
        .ref-list { font-size: 0.9em; margin: 10px 0; padding-left: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Contrôleur de Contraintes - Camaret</h1>
    <p class="subtitle">Copiez votre tableau brut (y compris les semaines type s14/2026 et le stock) et collez-le ici.</p>

    <div class="card">
        <textarea id="dataInput" placeholder="Collez le tableau Excel ici..."></textarea>
        <button onclick="analyserPlanif()">Analyser la Planification</button>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
function analyserPlanif() {
    const rawData = document.getElementById('dataInput').value;
    const resultsArea = document.getElementById('resultsArea');
    resultsArea.innerHTML = '<h2>Rapport d\'analyse</h2>';

    if (!rawData.trim()) {
        resultsArea.innerHTML += '<div class="alert alert-error">Veuillez coller des données.</div>';
        return;
    }

    const rows = rawData.split('\n').map(row => row.split('\t'));
    
    // Expression régulière pour les dates ou les semaines
    const dateOrWeekRegex = /(\d{2}[\/-]\d{2}[\/-]\d{2,4})|([sS]\d{1,2}\/\d{4})/; 

    let headerRowIndex = -1;
    let colDateStart = -1;

    // 1. Chasse à l'en-tête
    for (let i = 0; i < rows.length; i++) {
        for (let j = 0; j < rows[i].length; j++) {
            if (rows[i][j] && rows[i][j].trim().match(dateOrWeekRegex)) {
                headerRowIndex = i;
                colDateStart = j;
                break;
            }
        }
        if (headerRowIndex !== -1) break;
    }

    if (headerRowIndex === -1) {
        resultsArea.innerHTML += '<div class="alert alert-error">Impossible de trouver les dates ou les semaines (ex: 22/03/2026 ou s14/2026).</div>';
        return;
    }

    const headers = rows[headerRowIndex];
    let colFormat = -1;
    let colLigne = -1;
    let colNom = 0;
    let colStock = -1; // Colonne de stock

    // 2. Identification des colonnes
    for (let i = 0; i < headers.length; i++) {
        let h = headers[i].toLowerCase();
        if (h.includes("format")) colFormat = i;
        if (h.includes("ligne") || h.includes("boite")) colLigne = i;
        if (h.includes("nom") || h.includes("article")) colNom = i;
        if (h.includes("stock") || h.includes("aujourd'hui")) colStock = i; 
    }

    if (colLigne === -1) {
        colLigne = colDateStart - 1; 
    }

    if (colFormat === -1 || colLigne === -1) {
        resultsArea.innerHTML += '<div class="alert alert-error">Impossible de détecter la colonne Format ou Ligne.</div>';
        return;
    }

    // INITIALISATION DES STOCKS DE BOITES BLANCHES (BS)
    let stockDispoBS = {};
    if (colStock !== -1) {
        for (let r = headerRowIndex + 1; r < rows.length; r++) {
            let row = rows[r];
            let ligne = row[colLigne] ? row[colLigne].trim().toUpperCase() : "";
            let isBS = ligne.includes('42') || ligne.includes('43') || ligne.includes('31') || ligne.includes('70');
            
            if (isBS) {
                let codeFamille = ligne.split('-')[1]; // Ex: 4243-30461 -> on garde 30461
                if (codeFamille) {
                    let rawStock = row[colStock] ? row[colStock].replace(/\s/g, '').replace(',', '.') : "0";
                    let stockVal = parseFloat(rawStock) || 0;
                    if (!stockDispoBS[codeFamille]) stockDispoBS[codeFamille] = 0;
                    stockDispoBS[codeFamille] += stockVal;
                }
            }
        }
    }

    let hasErrorsGlobal = false;

    // 3. Analyse de toutes les colonnes (Jours ET Semaines)
    for (let dayIndex = colDateStart; dayIndex < headers.length; dayIndex++) {
        const currentDate = headers[dayIndex] ? headers[dayIndex].trim() : "";
        
        if (!currentDate.match(dateOrWeekRegex)) continue; 

        let bs_1_2 = [], bs_3_2 = [], pf_1_2 = [], pf_3_2 = [];
        let l43_1_2 = [], l31_1_2 = [], l70_1_2 = [];
        let bs_4_4 = [], pf_4_4 = []; 

        for (let r = headerRowIndex + 1; r < rows.length; r++) {
            const row = rows[r];
            if (row.length <= dayIndex) continue;

            let rawCell = row[dayIndex] ? row[dayIndex].replace(/\s/g, '').replace(',', '.') : "0";
            let prodQty = parseFloat(rawCell) || 0;
            if (prodQty <= 0) continue; 

            let nomArticle = row[colNom] ? row[colNom].trim() : "Article inconnu";
            let format = row[colFormat] ? row[colFormat].trim() : "";
            let ligne = row[colLigne] ? row[colLigne].trim().toUpperCase() : "";
            
            // MAJ : Ajout des nouvelles nomenclatures de lignes L02, L03, L05 pour le PF
            let isBS = ligne.includes('42') || ligne.includes('43') || ligne.includes('31') || ligne.includes('70');
            let isPF = ligne.includes('52') || ligne.includes('CDTL') || ligne.includes('L02') || ligne.includes('L03') || ligne.includes('L05');

            let item = { nom: nomArticle, machine: ligne, qty: prodQty };

            if (format.includes('1/2')) {
                if (isBS) bs_1_2.push(item);
                if (isPF) pf_1_2.push(item);
                
                if (ligne.includes('43')) l43_1_2.push(item);
                if (ligne.includes('31')) l31_1_2.push(item);
                if (ligne.includes('70')) l70_1_2.push(item);
            }
            if (format.includes('3/2')) {
                if (isBS) bs_3_2.push(item);
                if (isPF) pf_3_2.push(item);
            }
            if (format.includes('4/4')) {
                if (isBS) bs_4_4.push(item);
                if (isPF) pf_4_4.push(item);
            }
        }

        let periodLabel = currentDate.toLowerCase().startsWith('s') ? "Semaine" : "Date";
        let isWeek = periodLabel === "Semaine";
        let dailyReport = `<div class="report-day"><h3>🗓️ ${periodLabel} : ${currentDate}</h3>`;
        let errorsToday = 0;

        // NOUVEAU : Règle de Série Ligne 42 (Raviolis)
        let l42_32_items = bs_3_2.filter(i => i.machine.includes('42'));
        let l42_44_items = bs_4_4.filter(i => i.machine.includes('42'));
        if (l42_32_items.length > 0 && l42_44_items.length > 0) {
            let refsL42 = [...l42_32_items, ...l42_44_items].map(i => `<li>${i.nom} (Ligne ${i.machine})</li>`).join('');
            dailyReport += `
            <div class="alert alert-error">
                <div class="alert-title">❌ Conflit de Série sur Ligne 42 (Raviolis)</div>
                Mélange interdit des formats 3/2 et 4/4 sur la Ligne 42 dans la même période.
                <ul class="ref-list">${refsL42}</ul>
                <div class="solution">Solution : Ne mélangez jamais le 3/2 et le 4/4 la même semaine. Planifiez des séries de 4 à 5 jours consécutifs sur un même format.</div>
            </div>`;
            errorsToday++;
        }

        // Règle 1 : PAL 16 (Mise à jour avec la règle stricte du Taboulé)
        if ((bs_1_2.length > 0 || bs_3_2.length > 0) && (pf_1_2.length > 0 || pf_3_2.length > 0)) {
            let refsFabrication = [...bs_1_2, ...bs_3_2].map(i => `<li><b>BS :</b> ${i.nom} (Ligne ${i.machine})</li>`).join('');
            let refsConditionnement = [...pf_1_2, ...pf_3_2].map(i => `<li><b>PF :</b> ${i.nom} (Ligne ${i.machine})</li>`).join('');
            
            let conflitTitre = isWeek ? "❌ Conflit potentiel sur le PAL 16" : "❌ Conflit BLOQUANT sur le PAL 16";
            let solutionTexte = isWeek ? 
                "Attention : Sur une semaine complète, assurez-vous de ne pas planifier la Fab et le Condi ci-dessus le MÊME JOUR." : 
                "Solution : Le PAL 16 ne fait qu'une action. Décalez le conditionnement à un jour sans fabrication 1/2 ou 3/2. (Rappel : Si L70 fait du Taboulé 1/2, aucune reprise PF de Raviolis/Cannellonis n'est possible ce jour-là).";

            dailyReport += `
            <div class="alert alert-error">
                <div class="alert-title">${conflitTitre}</div>
                Production détectée en Fabrication (BS) ET en Conditionnement (PF) pour les formats 1/2 ou 3/2 sur cette période :
                <ul class="ref-list">${refsFabrication}${refsConditionnement}</ul>
                <div class="solution">${solutionTexte}</div>
            </div>`;
            errorsToday++;
        }

        // Règle 2 : Stérilisateur 1 (Mise à jour stricte)
        let activeSter1Lines = (l43_1_2.length > 0 ? 1 : 0) + (l31_1_2.length > 0 ? 1 : 0) + (l70_1_2.length > 0 ? 1 : 0);
        if (activeSter1Lines > 1) {
            let refsSter = [...l43_1_2, ...l31_1_2, ...l70_1_2].map(i => `<li>${i.nom} (Ligne ${i.machine})</li>`).join('');
            let conflitTitre = isWeek ? "❌ Conflit potentiel sur le Stérilisateur 1 (STER 01)" : "❌ Conflit BLOQUANT sur le Stérilisateur 1 (STER 01)";
            let solutionTexte = isWeek ? 
                "Attention : Assurez-vous que ces fabrications ne tournent pas simultanément le même jour." : 
                "Solution : Il est strictement interdit de planifier la L43, la L31 et la L70 le même jour. Une seule machine peut sortir du 1/2 à la fois.";

            dailyReport += `
            <div class="alert alert-error">
                <div class="alert-title">${conflitTitre}</div>
                Plusieurs lignes de Fabrication (BS) au format 1/2 sont prévues en même temps :
                <ul class="ref-list">${refsSter}</ul>
                <div class="solution">${solutionTexte}</div>
            </div>`;
            errorsToday++;
        }

        // Règle 3 : Quarantaine avec prise en compte du stock
        let pfEnQuarantaine = [];
        let pfDailyNeeds = {};
        
        let pfPrevu = [...pf_1_2, ...pf_3_2, ...pf_4_4];
        pfPrevu.forEach(pf => {
            let codeFamillePF = pf.machine.split('-')[1];
            if (codeFamillePF) {
                if (!pfDailyNeeds[codeFamillePF]) pfDailyNeeds[codeFamillePF] = { qty: 0, items: [] };
                pfDailyNeeds[codeFamillePF].qty += pf.qty;
                pfDailyNeeds[codeFamillePF].items.push(pf.nom);
            }
        });

        for (let codeFamille in pfDailyNeeds) {
            let besoin = pfDailyNeeds[codeFamille].qty;
            let stockDispo = stockDispoBS[codeFamille] || 0; 

            if (besoin > stockDispo) {
                let manquant = besoin - stockDispo;
                let noms = pfDailyNeeds[codeFamille].items.join(', ');
                pfEnQuarantaine.push(`<li><b>PF prévu :</b> ${noms} <br><i>Besoin : ${besoin.toLocaleString('fr-FR')} | Stock initial : ${stockDispo.toLocaleString('fr-FR')} | <b>Manquant : ${manquant.toLocaleString('fr-FR')} boîtes</b>. (Ce manque tape dans la prod récente = violation quarantaine)</i></li>`);
                stockDispoBS[codeFamille] = 0; // On a vidé le stock
            } else {
                stockDispoBS[codeFamille] -= besoin; // On déduit le besoin du stock pour les jours d'après
            }
        }

        if (pfEnQuarantaine.length > 0) {
            dailyReport += `
            <div class="alert alert-error">
                <div class="alert-title">⚠️ Violation de la Quarantaine (8 jours)</div>
                Le stock actuel de boîtes blanches est insuffisant pour couvrir ce conditionnement :
                <ul class="ref-list">${pfEnQuarantaine.join('')}</ul>
                <div class="solution">Solution : Retardez ces conditionnements de 8 jours pour laisser mûrir les nouvelles fabrications.</div>
            </div>`;
            errorsToday++;
        }

        if (errorsToday === 0) {
            dailyReport += `<div class="alert alert-success">✅ Toutes les contraintes (Séries, PAL 16, STER 01, Stocks/Quarantaine) sont respectées.</div>`;
        } else {
            hasErrorsGlobal = true;
        }

        dailyReport += `</div>`;
        
        let totalProd = bs_1_2.length + bs_3_2.length + pf_1_2.length + pf_3_2.length + bs_4_4.length + pf_4_4.length;
        if (totalProd > 0 || errorsToday > 0) {
            resultsArea.innerHTML += dailyReport;
        }
    }

    if (!hasErrorsGlobal) {
        resultsArea.innerHTML = '<h2>Rapport d\'analyse</h2><div class="alert alert-success"><div class="alert-title">🎉 Parfait !</div>Aucun conflit détecté, les séries sont bonnes, et les stocks couvrent bien vos conditionnements !</div>' + resultsArea.innerHTML;
    }
}
</script>

</body>
</html>
