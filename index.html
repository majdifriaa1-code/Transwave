<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur de Planification - Usine Camaret</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
            --success-bg: #f0fdf4;
            --success-text: #166534;
            --warning-bg: #fffbeb;
            --warning-text: #92400e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
        }
        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
        }
        .card {
            background-color: var(--card);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }
        button {
            display: block;
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .report-day {
            margin-top: 1.5rem;
            padding: 1rem;
            border-left: 4px solid #cbd5e1;
            background: #f1f5f9;
        }
        .report-day h3 { margin-top: 0; }
        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            border: 1px solid transparent;
        }
        .alert-error {
            background-color: var(--error-bg);
            color: var(--error-text);
            border-color: #fca5a5;
        }
        .alert-success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border-color: #86efac;
        }
        .alert-title { font-weight: bold; margin-bottom: 0.5rem; }
        .solution { margin-top: 0.5rem; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Contrôleur de Contraintes - Camaret</h1>
    <p class="subtitle">Copiez les données de votre Excel (avec les en-têtes) et collez-les ci-dessous.</p>

    <div class="card">
        <textarea id="dataInput" placeholder="Exemple de colonnes attendues : Nom article | Format | Famille | Ligne | 2026-03-24 | 2026-03-25 ..."></textarea>
        <button onclick="analyserPlanif()">Analyser la Planification</button>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
function analyserPlanif() {
    const rawData = document.getElementById('dataInput').value;
    const resultsArea = document.getElementById('resultsArea');
    resultsArea.innerHTML = '<h2>Rapport d\'analyse</h2>';

    if (!rawData.trim()) {
        resultsArea.innerHTML += '<div class="alert alert-error">Veuillez coller des données avant de lancer l\'analyse.</div>';
        return;
    }

    const rows = rawData.split('\n').map(row => row.split('\t'));
    if (rows.length < 2) {
        resultsArea.innerHTML += '<div class="alert alert-error">Format invalide. Assurez-vous de copier plusieurs lignes depuis Excel.</div>';
        return;
    }

    const headers = rows[0];
    
    // Détection basique des colonnes
    let colFormat = -1, colLigne = -1, colDateStart = -1;
    for(let i=0; i<headers.length; i++){
        let h = headers[i].toLowerCase();
        if (h.includes("format")) colFormat = i;
        if (h.includes("ligne") || h.includes("boite")) colLigne = i;
        if (h.match(/20\d{2}-\d{2}-\d{2}/) && colDateStart === -1) colDateStart = i; 
    }

    if (colFormat === -1 || colLigne === -1 || colDateStart === -1) {
        resultsArea.innerHTML += '<div class="alert alert-error">Impossible de détecter les colonnes "Format", "Ligne" ou les dates. Vérifiez vos données.</div>';
        return;
    }

    let hasErrorsGlobal = false;

    // Analyse jour par jour
    for (let dayIndex = colDateStart; dayIndex < headers.length; dayIndex++) {
        const currentDate = headers[dayIndex];
        if(!currentDate.match(/20\d{2}-\d{2}-\d{2}/)) continue; // Ne traiter que les dates

        let bs_1_2 = 0, bs_3_2 = 0, pf_1_2 = 0, pf_3_2 = 0;
        let l43_1_2 = 0, l31_1_2 = 0, l70_1_2 = 0;

        for (let r = 1; r < rows.length; r++) {
            const row = rows[r];
            if (row.length <= dayIndex) continue;

            let prodQty = parseFloat(row[dayIndex].replace(/\s/g, '').replace(',', '.')) || 0;
            if (prodQty <= 0) continue; // Pas de prod ce jour là pour cette ligne

            let format = row[colFormat].trim();
            let ligne = row[colLigne].trim().toUpperCase();
            
            let isBS = ligne.includes('42') || ligne.includes('43') || ligne.includes('31') || ligne.includes('70');
            let isPF = ligne.includes('52') || ligne.includes('CDTL');

            // Collecte de données pour PAL 16 (Formats 1/2 et 3/2)
            if (format.includes('1/2')) {
                if (isBS) bs_1_2 += prodQty;
                if (isPF) pf_1_2 += prodQty;
                
                // Collecte pour Ster 1
                if (ligne.includes('43')) l43_1_2 += prodQty;
                if (ligne.includes('31')) l31_1_2 += prodQty;
                if (ligne.includes('70')) l70_1_2 += prodQty;
            }
            if (format.includes('3/2')) {
                if (isBS) bs_3_2 += prodQty;
                if (isPF) pf_3_2 += prodQty;
            }
        }

        // Vérification des règles pour la date en cours
        let dailyReport = `<div class="report-day"><h3>🗓️ Date : ${currentDate}</h3>`;
        let errorsToday = 0;

        // Règle 1 : PAL 16 (Conflit BS / PF sur 1/2 et 3/2)
        if ((bs_1_2 > 0 || bs_3_2 > 0) && (pf_1_2 > 0 || pf_3_2 > 0)) {
            dailyReport += `
            <div class="alert alert-error">
                <div class="alert-title">❌ Conflit sur le PAL 16</div>
                Production détectée en Fabrication (BS) ET en Conditionnement (PF) pour les formats 1/2 ou 3/2 le même jour. Le PAL 16 ne peut faire qu'une action par jour.
                <div class="solution">Solution : Décaler le conditionnement (PF) des formats 1/2 et 3/2 à un jour où aucune fabrication (BS) de ces formats n'est prévue.</div>
            </div>`;
            errorsToday++;
        }

        // Règle 2 : Stérilisateur 1 (Conflit des lignes 1/2)
        let activeSter1Lines = (l43_1_2 > 0 ? 1 : 0) + (l31_1_2 > 0 ? 1 : 0) + (l70_1_2 > 0 ? 1 : 0);
        if (activeSter1Lines > 1) {
            dailyReport += `
            <div class="alert alert-error">
                <div class="alert-title">❌ Conflit sur le Stérilisateur 1 (STER 01)</div>
                Plusieurs lignes de Fabrication (BS) au format 1/2 tournent en même temps. Il n'y a qu'un seul stérilisateur pour ce format.
                <div class="solution">Solution : Isoler les productions. Ne faire tourner qu'une seule de ces lignes (L43, L31, ou L70) pour le format 1/2 ce jour-là.</div>
            </div>`;
            errorsToday++;
        }

        if (errorsToday === 0) {
            dailyReport += `<div class="alert alert-success">✅ Toutes les contraintes majeures (PAL 16, STER 01) sont respectées pour cette journée.</div>`;
        } else {
            hasErrorsGlobal = true;
        }

        dailyReport += `</div>`;
        
        // N'afficher la journée que s'il y a de la production ou des erreurs
        if (bs_1_2 > 0 || bs_3_2 > 0 || pf_1_2 > 0 || pf_3_2 > 0 || errorsToday > 0) {
            resultsArea.innerHTML += dailyReport;
        }
    }

    if (!hasErrorsGlobal) {
        resultsArea.innerHTML = '<h2>Rapport d\'analyse</h2><div class="alert alert-success"><div class="alert-title">🎉 Parfait !</div>Aucun conflit détecté sur l\'ensemble de la période copiée ! L\'ordonnanceur a respecté les règles de machines partagées.</div>' + resultsArea.innerHTML;
    }
}
</script>

</body>
</html>
